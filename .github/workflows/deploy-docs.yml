name: Build and Deploy Docs

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r requirements-docs.txt

      - name: Build and deploy versioned documentation
        run: |
          # Configure git for mike
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Deploy initial version if gh-pages branch doesn't exist or is empty
          if ! git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            echo "Creating new gh-pages branch with initial version..."
            mike deploy --push --update-aliases 1.0 latest
          else
            echo "Deploying new version to existing gh-pages branch..."
            # Fetch the gh-pages branch for mike to work with
            git fetch origin gh-pages:gh-pages
            # Deploy new version (you can change the version number as needed)
            mike deploy --push --update-aliases 1.0 latest
          fi
