site_name: SQL Cockpit Documentation
site_description: Documentation for SQL Cockpit - PowerShell-based SQL tooling suite
site_url: https://your-domain.github.io/sql-cockpit/

repo_name: sql-cockpit
repo_url: https://github.com/your-org/sql-cockpit

docs_dir: .

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
    - Overview: user/index.md
    - Dashboard Guide: user/dashboard-guide.md
    - Connection and Instance Profiles: user/connection-and-instance-profiles.md
    - Sync Configuration Workflow: user/sync-configuration-workflow.md
  - Operations:
    - Common Tasks: operations/common-tasks.md
    - Connection Manager: operations/connection-manager.md
    - Estate Overview: operations/estate-overview.md
    - Instance Manager: operations/instance-manager.md
    - SQL Agent Manager: operations/sql-agent-manager.md
    - Visualize TableConfig: operations/visualize-tableconfig.md
  - Configuration:
    - Overview: configuration/overview.md
    - Reference: configuration/reference.md
    - Flags:
      - SyncID: configuration/flags/syncid.md
      - AutoCreateDestinationTable: configuration/flags/autocreatedestinationtable.md
      - DestinationAuthMode: configuration/flags/destinationauthmode.md
      - DestinationTable: configuration/flags/destinationtable.md
      - DestinationDatabase: configuration/flags/destinationdatabase.md
      - DestinationUsername: configuration/flags/destinationusername.md
      - DestinationPassword: configuration/flags/destinationpassword.md
      - SourceServer: configuration/flags/sourceserver.md
      - SourceDatabase: configuration/flags/sourcedatabase.md
      - SourceSchema: configuration/flags/sourceschema.md
      - SourceTable: configuration/flags/sourcetable.md
      - SourceUsername: configuration/flags/sourceusername.md
      - SourcePassword: configuration/flags/sourcepassword.md
      - SyncMode: configuration/flags/syncmode.md
      - WatermarkColumn: configuration/flags/watermarkcolumn.md
      - PrimaryKeyColumns: configuration/flags/primarykeycolumns.md
      - FilterClause: configuration/flags/filterclause.md
      - PreSyncSQL: configuration/flags/presyncsql.md
      - PostSyncSQL: configuration/flags/postsyncsql.md
      - BatchSize: configuration/flags/batchsize.md
      - RetryCount: configuration/flags/retrycount.md
      - CreatePrimaryKeyOnAutoCreate: configuration/flags/createprimarykeyonautocreate.md
      - TrustServerCertificate: configuration/flags/trustservercertificate.md
  - Database:
    - Config Tables: database/config-tables.md
  - Architecture:
    - Overview: architecture/overview.md
    - Components: architecture/components.md
    - Data Flow: architecture/data-flow.md
    - Object Search: architecture/object-search.md
  - Integrations:
    - Overview: integrations/overview.md
  - Developer Documentation:
    - Overview: developer/index.md
    - System Map: developer/system-map.md
    - Local Development: developer/local-development.md
    - Cross-Platform Service Strategy: developer/cross-platform-service-strategy.md
    - Data Model And Runtime Contracts: developer/data-model-and-runtime-contracts.md
    - REST And Dashboard Internals: developer/rest-and-dashboard-internals.md
    - Documentation Maintenance: developer/documentation-maintenance.md
    - Docs Screenshots: developer/docs-screenshots.md
  - Glossary: glossary.md
  - Contributing: CONTRIBUTING.md

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: auto
      height: auto
      zoomable: true
      draggable: true
      skip_classes: []
      auto_caption: true
      caption_position: bottom
      background: white
      shadow: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: your-org
      repo: sql-cockpit
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - javascripts/mermaid-init.js

extra_css:
  - stylesheets/extra.css

watch:
  - docs
  - mkdocs.yml
