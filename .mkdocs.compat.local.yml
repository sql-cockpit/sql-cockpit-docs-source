# Project information
site_name: SQL Cockpit Documentation
site_description: Documentation for SQL Cockpit - PowerShell-based SQL tooling suite
site_url: https://your-domain.github.io/sql-cockpit/
site_author: SQL Cockpit Team

# Repository
repo_name: sql-cockpit
repo_url: https://github.com/sql-cockpit/sql-cockpit
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2026 - SQL Cockpit

# Theme
theme:
  name: material
  # Custom logo and favicon
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  # Language
  language: en
  # Color palette
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  # Features
  features:
    # Navigation
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.path
    - navigation.prune
    - navigation.tracking
    # Header
    - header.autohide
    # Search
    - search.highlight
    - search.share
    - search.suggest
    # Content
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tooltips
    # Other
    - announce.dismiss
    - content.footnote.tooltips
    - tabs

