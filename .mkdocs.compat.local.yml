plugins:
  # Search plugin with enhanced configuration
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  # Tags for content organization
  # Blog plugin
  # Social cards for link previews (requires Pillow)
  # Analytics (Google Analytics 4 example - replace with your ID)
  # - analytics:
  #     provider: google
  #     property: G-XXXXXXXXXX
  # Privacy-friendly analytics alternative (Matomo)
  # - analytics:
  #     provider: matomo
  #     property: instance-id.matomo.cloud/1
  # Lightbox for images
  # Versioning support with mike
# Customization
extra:
  # Version selector for mike (must be under extra)
  version:
    provider: mike
  # Social links in footer
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sql-cockpit/sql-cockpit
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/sql-cockpit/sql-cockpit
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/sql-cockpit
    - icon: fontawesome/solid/envelope
      link: mailto:support@sql-cockpit.com
  # Generator meta tag for privacy
  generator: false
  # Consent management for privacy compliance
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - manage
  # Alternative repository configuration
  alternate:
    - name: English
      link: /
      lang: en
    # Add more languages here when translations are available
    # - name: Deutsch
    #   link: /de/
    #   lang: de
  # Status indicator for site-wide announcements
  status:
    new: Recently added
    deprecated: Deprecated

markdown_extensions:
  # Core extensions
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: true
      permalink_leading: true
      toc_depth: 4
  # PyMdownX extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      linenums: true
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: sql-cockpit
      repo: sql-cockpit
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.tilde

# Custom fonts (optional - uncomment to use Google Fonts)
# extra:
#   font:
#     text: Roboto
#     code: Roboto Mono

extra_javascript:
  - javascripts/mermaid-init.js
  # Offline support for service worker
  # - https://unpkg.com/workbox-build@7.0.0/build/workbox-sw.js

extra_css:
  - stylesheets/extra.css

# Build optimization
watch:
  - mkdocs.yml
  - includes

